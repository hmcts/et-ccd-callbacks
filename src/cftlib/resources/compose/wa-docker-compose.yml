---
# Work Allocation docker services for CFTLib local development.
# Loaded automatically when ET_WORK_ALLOCATION=true is set before running bootWithCCD.
#
# Attaches to the cftlib_default network so containers can reach the IDAM simulator
# and other CFTLib services by name.

services:
  camunda:
    image: "hmctsprod.azurecr.io/camunda/bpm:latest"
    environment:
      CAMUNDA_DB_USER_NAME: postgres
      CAMUNDA_DB_PASSWORD: postgres
      CAMUNDA_DB_HOST: host.docker.internal
      CAMUNDA_DB_PORT: 6432
      S2S_URL: http://host.docker.internal:8489
      S2S_SECRET_CAMUNDA_BPM: ${S2S_SECRET_CAMUNDA_BPM:-AAAAAAAAAAAAAAAA}
      CLIENT_ID: ${CAMUNDA_CLIENT_ID:-dummy}
      CLIENT_SECRET: ${CAMUNDA_CLIENT_SECRET:-dummy}
      SPRING_FLYWAY_ENABLED: false
      CAMUNDA_BPM_DATABASE_SCHEMA_UPDATE: true
      SPRING_PROFILES_ACTIVE:
      TASK_MANAGEMENT_API_URL: http://host.docker.internal:8087
      LOGGING_LEVEL_ROOT: INFO
      WA_AUTO_CONFIGURE_TASKS_ENABLED: false
      CAMUNDA_API_AUTH_ENABLED: false
    ports:
      - "9090:8999"

  wa-workflow-api:
    image: "hmctsprod.azurecr.io/wa/workflow-api:latest"
    environment:
      SPRING_PROFILES_ACTIVE: local
      CAMUNDA_URL: http://camunda:8999/engine-rest
      WA_TASK_MANAGEMENT_API_URL: http://host.docker.internal:8087
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 6432
      POSTGRES_PASSWORD: postgres
      S2S_URL: http://host.docker.internal:8489
      S2S_SECRET_WORKFLOW_API: ${S2S_SECRET_WORKFLOW_API:-AAAAAAAAAAAAAAAA}
      LAUNCH_DARKLY_SDK_KEY: ${WA_LAUNCH_DARKLY_SDK_KEY:-sdk-key}
      SPRING_FLYWAY_SCHEMAS: wa_workflow_api
    ports:
      - "9192:8099"
    depends_on:
      - camunda

  wa-case-event-handler:
    image: "hmctsprod.azurecr.io/wa/case-event-handler:latest"
    environment:
      SPRING_PROFILES_ACTIVE: cftlib
      APPLICATIONINSIGHTS_CONNECTION_STRING: InstrumentationKey=00000000-0000-0000-0000-000000000000
      SPRING_FLYWAY_ENABLED: false
      AZURE_SERVICE_BUS_DLQ_FEATURE_TOGGLE: false
      OPEN_ID_IDAM_URL: http://host.docker.internal:5062
      S2S_URL: http://host.docker.internal:8489
      S2S_SECRET_CASE_EVENT_HANDLER: ${S2S_SECRET_CASE_EVENT_HANDLER:-AAAAAAAAAAAAAAAA}
      IDAM_URL: http://host.docker.internal:5062
      WA_WORKFLOW_API_URL: http://wa-workflow-api:8099
      WA_TASK_MANAGEMENT_API_URL: http://host.docker.internal:8087
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 6432
      POSTGRES_NAME: et_cos
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      WA_IDAM_CLIENT_SECRET: ${WA_IDAM_CLIENT_SECRET:-AAAAAAAAAAAAAAAA}
      LAUNCH_DARKLY_SDK_KEY: ${WA_LAUNCH_DARKLY_SDK_KEY:-sdk-key}
      ROLE_ASSIGNMENT_URL: http://host.docker.internal:4096
      CCD_URL: http://host.docker.internal:4452
    ports:
      - "8088:8088"
    depends_on:
      - wa-workflow-api

  wa-task-monitor:
    image: "hmctsprod.azurecr.io/wa/task-monitor:latest"
    environment:
      APPLICATIONINSIGHTS_CONNECTION_STRING: InstrumentationKey=00000000-0000-0000-0000-000000000000
      OPEN_ID_IDAM_URL: http://host.docker.internal:5062
      WA_IDAM_CLIENT_SECRET: ${WA_IDAM_CLIENT_SECRET:-AAAAAAAAAAAAAAAA}
      CAMUNDA_URL: http://camunda:8999/engine-rest
      WA_TASK_MANAGEMENT_API_URL: http://host.docker.internal:8087
      CASE_EVENT_HANDLER_SERVICE_URL: http://wa-case-event-handler:8088
      CCD_SEARCH_URL: http://host.docker.internal:4452
      CCD_URL: http://host.docker.internal:4452
      S2S_URL: http://host.docker.internal:8489
      S2S_SECRET_TASK_MONITOR: ${S2S_SECRET_TASK_MONITOR:-AAAAAAAAAAAAAAAA}
      ROLE_ASSIGNMENT_URL: http://host.docker.internal:4096
      WA_SYSTEM_USERNAME: ${WA_SYSTEM_USERNAME:-wa-system-user@fake.hmcts.net}
      WA_SYSTEM_PASSWORD: ${WA_SYSTEM_PASSWORD:-password}
      IDAM_URL: http://host.docker.internal:5062
    ports:
      - "9194:8077"
    depends_on:
      - wa-case-event-handler

networks:
  default:
    name: cftlib_default
    external: true
