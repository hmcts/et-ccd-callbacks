name: Java CI

permissions:
  contents: read
  id-token: write

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - refs/tags/*
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - name: Build
        run: ./gradlew :et-shared:check

  cftlib:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: 82f79201-9a30-4160-b264-7bbed775c7f4
          tenant-id: 531ff96d-0ae9-462a-8d2d-bec7c0b42082
          allow-no-subscriptions: true
      - name: ACR login
        run: az acr login --name hmctsprod
      - name: Test with CCD
        run: ./gradlew cftlibTest
