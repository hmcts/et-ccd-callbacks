# GENERAL SPRING BOOT ACTUATOR CONFIG
# Context path for Spring Boot Actuator endpoints
management:
  endpoints:
    web:
      base-path: /
  endpoint:
    health:
      show-details: always

spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: 'true'
  application:
    name: et-cos
  datasource:
    password: ${ET_COS_DB_PASSWORD:}
    url: jdbc:postgresql://${ET_COS_DB_HOST:localhost}:${ET_COS_DB_PORT:5432}/${ET_COS_DB_NAME:et_cos}${ET_COS_DB_CONN_OPTIONS:}
    username: ${ET_COS_DB_USER_NAME:et_cos}
  config:
    import: optional:configtree:/mnt/secrets/et-cos/,optional:configtree:/mnt/secrets/et/
  jms:
    servicebus:
      enabled: true
      connection-string: ${AZURE_SERVICE_BUS_CONNECTION_STRING:${AZURE_SERVICE_BUS_PREVIEW_CONNECTION_STRING:dummy}}
      pricing-tier: standard
      pool:
        enabled: true
  cloud:
    azure:
      credential:
        managed-identity-enabled: true
        client-id: 34df67df-77f4-4c8d-9e89-d59a86ef9ffe
  autoconfigure:
    exclude: com.azure.spring.cloud.autoconfigure.implementation.context.AzureTokenCredentialAutoConfiguration

server:
  port: '8081'

feign:
  httpclient:
    enabled: 'true'

tornado:
  accessKey: ${TORNADO_ACCESS_KEY}
  url: ${TORNADO_URL:https://eu.dws3.docmosis.com/api/render}

ccd:
  client:
    timeout: '60000'
  data-store-api-url: ${CCD_DATA_STORE_API_URL:http://ccd-data-store-api:4452}

core_case_data:
  api:
    url: ${CCD_DATA_STORE_API_URL:http://localhost:4452}
  search:
    page_size: ${CCD_SEARCH_PAGE_SIZE:100}

document_management:
  ccdCaseDocument:
    url: ${DOCUMENT_MANAGEMENT_URL:http://dm-store:8080}
  url: ${DOCUMENT_MANAGEMENT_URL:http://dm-store:8080}

idam:
  s2s-auth:
    # noinspection SpringBootApplicationYaml
    url: ${SERVICE_AUTH_PROVIDER_URL:http://service-auth-provider-api:8080} # used in ServiceAuthorisationApi
    totp_secret: ${ET_COS_S2S_SECRET:AAAAAAAAAAAAAAAC}
    secret: ${ET_COS_S2S_SECRET:AAAAAAAAAAAAAAAC}
    microservice: ${MICRO_SERVICE:ccd_gw}
  api:
    url: ${IDAM_API_URL:http://sidam-api:5000}
    jwkUrl: ${IDAM_API_JWK_URL:http://sidam-api:5000/jwks}
    jwksUrl: ${IDAM_JWKS_BASEURL:${IDAM_API_JWK_URL:http://sidam-api:5000/jwks}}
  client:
    scope: openid profile roles manage-user
    secret: ${IDAM_CLIENT_SECRET:${ET_SYA_API_IDAM_CLIENT_SECRET:AAAAAAAAAAAAAAAA}}
    id: ${REFORM_SERVICE_NAME:et-cos}

ccd_gateway_base_url: ${CCD_GATEWAY_BASE_URL:http://127.0.0.1:3453}

case_document_am:
  url: ${CASE_DOCUMENT_AM_URL:http://ccd-case-document-am-api:4455}
  max_retries: ${CASE_DOCUMENT_AM_MAX_RETRIES:3}

rd_professional-api-url: ${RD_PROFESSIONAL_API_URL:http://localhost:4507}

feature:
  secure-doc-store:
    enabled: 'false'

queue:
  create-updates:
    # Database queue configuration (replaces Azure Service Bus)
    poll-interval: ${CREATE_UPDATES_POLL_INTERVAL:1000}
    batch-size: ${CREATE_UPDATES_BATCH_SIZE:10}
    threads: ${CREATE_UPDATES_THREADS:15}
  update-case:
    # Database queue configuration (replaces Azure Service Bus)
    poll-interval: ${UPDATE_CASE_POLL_INTERVAL:1000}
    batch-size: ${UPDATE_CASE_BATCH_SIZE:10}
    threads: ${UPDATE_CASE_THREADS:15}

springdoc:
  packagesToScan: uk.gov.hmcts.ethos.replacement.docmosis.controllers
  pathsToMatch: /**

gov-notify-api-key: ${GOV_NOTIFY_API_KEY}

